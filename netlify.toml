[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."gtu-sync-bg"]
  timeout = 900
  schedule = "@hourly"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
